<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solarized — Stars</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    font-family: 'Segoe UI', sans-serif;
}

/* CANVAS */
canvas {
    position: fixed;
    inset: 0;
}

/* CLOCK */
#clock {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d6dcff;
    font-size: 56px; /* smaller */
    letter-spacing: 4px;
    text-shadow:
        0 0 12px rgba(140,160,255,0.8),
        0 0 32px rgba(90,120,255,0.5);
    z-index: 5;
    user-select: none;
}
</style>
</head>
<body>

<canvas id="space"></canvas>
<div id="clock"></div>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");
const clock = document.getElementById("clock");

/* ---------- RESIZE ---------- */
function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    initStars(); // regenerate stars properly
}
addEventListener("resize", resize);

/* ---------- CLOCK ---------- */
function updateClock() {
    const now = new Date();
    clock.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });
}
setInterval(updateClock, 1000);
updateClock();

/* ---------- STARS ---------- */
let stars = [];

function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 8000); // density-based

    for (let i = 0; i < count; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.4,
            phase: Math.random() * Math.PI * 2,
            speed: 0.002 + Math.random() * 0.004
        });
    }
}

function drawStars() {
    stars.forEach(star => {
        star.phase += star.speed;
        const alpha = 0.3 + Math.sin(star.phase) * 0.4;

        ctx.fillStyle = `rgba(200,210,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

/* ---------- LOOP ---------- */
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawStars();
    requestAnimationFrame(animate);
}

/* INIT */
resize();
animate();
</script>

</body>
</html>
